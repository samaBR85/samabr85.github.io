name: Update stats

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:         # manual trigger from Actions tab
  push:
    branches: [master]
    paths:
      - '.github/workflows/update-stats.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build stats.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          OWNER=samaBR85
          REPOS=(BeatMarker-PremierePlugin BeatMarker-AEPlugin MonoStereoToggle Gen6CTRPFrameworkOverhauled 3DSnickerStream 1clicktransfer)

          json='{'
          first=1
          for repo in "${REPOS[@]}"; do
            stars=$(gh api "repos/$OWNER/$repo" --jq '.stargazers_count')
            downloads=$(gh api "repos/$OWNER/$repo/releases" \
              --jq '[.[].assets[].download_count] | add // 0')
            [ $first -eq 0 ] && json="$json,"
            json="$json\"$repo\":{\"stars\":$stars,\"downloads\":$downloads}"
            first=0
          done
          json="$json}"

          echo "$json" | jq '.' > stats.json
          cat stats.json

      - name: Commit if changed
        run: |
          if [ -z "$(git status --porcelain stats.json)" ]; then
            echo "stats.json unchanged — skipping commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git commit -m "Update stats.json"
          git push
